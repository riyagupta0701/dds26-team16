# =============================================================================
# NGINX GATEWAY — Kubernetes Manifests
# =============================================================================
# Internal reverse proxy that mirrors the docker-compose "gateway" service.
# Routes the order service's outbound calls (/stock/, /payment/) to the correct
# pods inside the cluster. Config is mounted from the "gateway-nginx-conf"
# ConfigMap, which the deploy scripts create from k8s/gateway-nginx.conf.
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: ClusterIP
  selector:
    component: gateway
  ports:
    - port: 80
      name: http
      targetPort: 80

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      component: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        component: gateway
    spec:
      containers:
        - name: gateway
          image: nginx:1.25-bookworm
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          ports:
            - containerPort: 80
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3

          # Mount the ConfigMap (created from k8s/gateway-nginx.conf by the deploy
          # script) as /etc/nginx/nginx.conf inside the container.
          # subPath mounts only the "nginx.conf" key, not the whole directory.
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true

      volumes:
        - name: nginx-conf
          configMap:
            name: gateway-nginx-conf
