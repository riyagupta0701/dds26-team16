# =============================================================================
# PAYMENT SERVICE — Kubernetes Manifests
# =============================================================================
# The payment service is a 2PC/Saga PARTICIPANT. It manages user credit.
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  type: ClusterIP
  selector:
    component: payment
  ports:
    - port: 5000
      name: http
      targetPort: 5000

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-deployment
spec:
  replicas: 2

  selector:
    matchLabels:
      component: payment

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        component: payment
    spec:
      containers:
        - name: payment
          image: payment:latest
          imagePullPolicy: Never

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1"

          command: ["gunicorn"]
          args: ["-b", "0.0.0.0:5000", "-w", "4", "--timeout", "30",
                 "--log-level", "info", "app:app"]

          ports:
            - containerPort: 5000

          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3

          env:
            - name: REDIS_HOST
              value: "payment-redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              value: "redis"
            - name: REDIS_DB
              value: "0"
            - name: REDIS_SENTINEL_HOSTS
              value: "payment-redis:26379"
            - name: REDIS_MASTER_NAME
              value: "mymaster"
