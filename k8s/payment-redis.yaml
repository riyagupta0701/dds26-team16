# =============================================================================
# PAYMENT Redis: master + replica + sentinel
# Mirrors the docker-compose setup exactly (redis:7.2-bookworm, same commands).
# =============================================================================

# ── Master ──────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: payment-redis-master
spec:
  type: ClusterIP
  selector:
    component: payment-redis-master
  ports:
    - port: 6379
      targetPort: 6379

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-redis-master
spec:
  replicas: 1
  selector:
    matchLabels:
      component: payment-redis-master
  template:
    metadata:
      labels:
        component: payment-redis-master
    spec:
      containers:
        - name: redis
          image: redis:7.2-bookworm
          command: ["redis-server"]
          args:
            - "--requirepass"
            - "redis"
            - "--masterauth"
            - "redis"
            - "--maxmemory"
            - "512mb"
            - "--appendonly"
            - "yes"
            - "--appendfsync"
            - "everysec"
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", "redis", "--no-auth-warning", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3

---

# ── Replica ──────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: payment-redis-replica
spec:
  type: ClusterIP
  selector:
    component: payment-redis-replica
  ports:
    - port: 6379
      targetPort: 6379

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-redis-replica
spec:
  replicas: 1
  selector:
    matchLabels:
      component: payment-redis-replica
  template:
    metadata:
      labels:
        component: payment-redis-replica
    spec:
      containers:
        - name: redis
          image: redis:7.2-bookworm
          command: ["redis-server"]
          args:
            - "--requirepass"
            - "redis"
            - "--replicaof"
            - "payment-redis-master"
            - "6379"
            - "--masterauth"
            - "redis"
            - "--maxmemory"
            - "512mb"
            - "--appendonly"
            - "yes"
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", "redis", "--no-auth-warning", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3

---

# ── Sentinel ──────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: payment-redis-sentinel
spec:
  type: ClusterIP
  selector:
    component: payment-redis-sentinel
  ports:
    - port: 26379
      targetPort: 26379

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-redis-sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      component: payment-redis-sentinel
  template:
    metadata:
      labels:
        component: payment-redis-sentinel
    spec:
      containers:
        - name: sentinel
          image: redis:7.2-bookworm
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo 'sentinel resolve-hostnames yes' > /tmp/sentinel.conf
              echo 'sentinel monitor payment-master payment-redis-master 6379 1' >> /tmp/sentinel.conf
              echo 'sentinel auth-pass payment-master redis' >> /tmp/sentinel.conf
              echo 'sentinel down-after-milliseconds payment-master 5000' >> /tmp/sentinel.conf
              echo 'sentinel failover-timeout payment-master 10000' >> /tmp/sentinel.conf
              echo 'sentinel parallel-syncs payment-master 1' >> /tmp/sentinel.conf
              redis-server /tmp/sentinel.conf --sentinel --port 26379
          ports:
            - containerPort: 26379
          readinessProbe:
            exec:
              command: ["redis-cli", "-p", "26379", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
