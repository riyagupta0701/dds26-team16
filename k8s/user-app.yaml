# =============================================================================
# PAYMENT SERVICE — Kubernetes Manifests
# =============================================================================
# The payment service is a 2PC/Saga PARTICIPANT. It manages user credit.
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  type: ClusterIP
  selector:
    component: user
  ports:
    - port: 5000
      name: http
      targetPort: 5000

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-deployment
spec:
  replicas: 1

  selector:
    matchLabels:
      component: user

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        component: user
    spec:
      containers:
        - name: user
          image: user:latest

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1"

          command: ["gunicorn"]
          args: ["-b", "0.0.0.0:5000", "-w", "2", "--timeout", "30",
                 "--log-level", "info", "app:app"]

          ports:
            - containerPort: 5000

          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3

          env:
            - name: REDIS_HOST
              value: "redis-master"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              value: "redis"
            - name: REDIS_DB
              value: "2"
