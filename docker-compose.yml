      - MQ_REDIS_PORT=6379
      - MQ_REDIS_PASSWORD=redis
      - MQ_REDIS_DB=0
      - GATEWAY_URL=http://gateway:80
      - CHECKOUT_MODE=saga
      - REDIS_HOST=order-redis-master
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
      - REDIS_SENTINEL_HOSTS=order-redis-sentinel:26379,order-redis-sentinel-2:26379,order-redis-sentinel-3:26379
      - REDIS_MASTER_NAME=order-master
