services:
  # ORCHESTRATOR WAL STORE
  orch-redis-master:
    image: redis:7.2-bookworm
    command: ["redis-server", "--requirepass", "redis", "--masterauth", "redis",
              "--maxmemory", "512mb", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - orch-master-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  orch-redis-replica:
    image: redis:7.2-bookworm
    command: ["redis-server", "--requirepass", "redis", "--replicaof", "orch-redis-master", "6379",
              "--masterauth", "redis", "--maxmemory", "512mb", "--appendonly", "yes"]
    volumes:
      - orch-replica-data:/data
    depends_on:
      orch-redis-master:
        condition: service_healthy
    restart: unless-stopped

  orch-redis-sentinel:
    image: redis:7.2-bookworm
    command: >
      sh -c "
        echo 'sentinel resolve-hostnames yes' > /tmp/sentinel.conf &&
        echo 'sentinel monitor orch-master orch-redis-master 6379 1' >> /tmp/sentinel.conf &&
        echo 'sentinel auth-pass orch-master redis' >> /tmp/sentinel.conf &&
        echo 'sentinel down-after-milliseconds orch-master 5000' >> /tmp/sentinel.conf &&
        echo 'sentinel failover-timeout orch-master 10000' >> /tmp/sentinel.conf &&
        echo 'sentinel parallel-syncs orch-master 1' >> /tmp/sentinel.conf &&
        redis-server /tmp/sentinel.conf --sentinel --port 26379
      "
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
    depends_on:
      orch-redis-master:
        condition: service_healthy
    restart: unless-stopped

  # ORCHESTRATOR SERVICE
  orchestrator-1:
    build: ./orchestrator
    image: orchestrator
    environment:
      - MQ_REDIS_HOST=mq-redis
      - MQ_REDIS_PORT=6379
      - MQ_REDIS_PASSWORD=redis
      - MQ_REDIS_DB=0
      - ORCH_REDIS_PASSWORD=redis
      - ORCH_REDIS_DB=0
      - ORCH_SENTINEL_HOSTS=orch-redis-sentinel:26379
      - ORCH_MASTER_NAME=orch-master
      - ORCH_MAX_RETRIES=3
      - ORCH_TASK_TIMEOUT_S=5
    depends_on:
      mq-redis:
        condition: service_healthy
      orch-redis-sentinel:
        condition: service_healthy
    restart: unless-stopped

  orchestrator-2:
    build: ./orchestrator
    image: orchestrator
    environment:
      - MQ_REDIS_HOST=mq-redis
      - MQ_REDIS_PORT=6379
      - MQ_REDIS_PASSWORD=redis
      - MQ_REDIS_DB=0
      - ORCH_REDIS_PASSWORD=redis
      - ORCH_REDIS_DB=0
      - ORCH_SENTINEL_HOSTS=orch-redis-sentinel:26379
      - ORCH_MASTER_NAME=orch-master
      - ORCH_MAX_RETRIES=3
      - ORCH_TASK_TIMEOUT_S=5
    depends_on:
      mq-redis:
        condition: service_healthy
      orch-redis-sentinel:
        condition: service_healthy
    restart: unless-stopped

  # MESSAGE QUEUE BROKER (Transient)
  mq-redis:
    image: redis:7.2-bookworm
    command: ["redis-server", "--requirepass", "redis", "--maxmemory", "512mb"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  gateway:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - order-service-1
      - order-service-2
      - stock-service-1
      - stock-service-2
      - payment-service-1
      - payment-service-2
    restart: unless-stopped

  # ORDER SERVICE
  order-service-1:
    build: ./order
    image: order:latest
    environment:
      - MQ_REDIS_HOST=mq-redis
      - MQ_REDIS_PORT=6379
      - MQ_REDIS_PASSWORD=redis
      - MQ_REDIS_DB=0
      - GATEWAY_URL=http://gateway:80
      - CHECKOUT_MODE=saga
      - REDIS_HOST=order-redis-master
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
      - REDIS_SENTINEL_HOSTS=order-redis-sentinel:26379
      - REDIS_MASTER_NAME=order-master
    command: gunicorn -b 0.0.0.0:5000 -w 4 --timeout 70 --log-level=info app:app
    depends_on:
      mq-redis:
        condition: service_healthy
      order-redis-sentinel:
        condition: service_healthy
    restart: unless-stopped

  order-service-2:
    build: ./order
    image: order:latest
    environment:
      - MQ_REDIS_HOST=mq-redis
      - MQ_REDIS_PORT=6379
      - MQ_REDIS_PASSWORD=redis
      - MQ_REDIS_DB=0
      - GATEWAY_URL=http://gateway:80
      - CHECKOUT_MODE=saga
      - REDIS_HOST=order-redis-master
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
      - REDIS_SENTINEL_HOSTS=order-redis-sentinel:26379
      - REDIS_MASTER_NAME=order-master
    command: gunicorn -b 0.0.0.0:5000 -w 4 --timeout 70 --log-level=info app:app
    depends_on:
      mq-redis:
        condition: service_healthy
      order-redis-sentinel:
