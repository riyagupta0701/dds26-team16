services:

  gateway:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - order-service-1
      - order-service-2
      - stock-service-1
      - stock-service-2
      - payment-service-1
      - payment-service-2
    restart: unless-stopped

  # ORDER SERVICE
  order-service-1:
    build: ./order
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
      - CHECKOUT_MODE=saga
      - REDIS_HOST=order-redis-master
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
    command: gunicorn -b 0.0.0.0:5000 -w 4 --timeout 30 --log-level=info app:app
    depends_on:
      order-redis-master:
        condition: service_healthy
    restart: unless-stopped

  order-service-2:
    build: ./order
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
      - CHECKOUT_MODE=saga
      - REDIS_HOST=order-redis-master
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
    command: gunicorn -b 0.0.0.0:5000 -w 4 --timeout 30 --log-level=info app:app
    depends_on:
      order-redis-master:
        condition: service_healthy
    restart: unless-stopped

  order-redis-master:
    image: redis:7.2-bookworm
    command: ["redis-server", "--requirepass", "redis", "--maxmemory", "512mb", "--appendonly", "yes"]
    volumes:
      - order-master-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  order-redis-replica:
    image: redis:7.2-bookworm
    command: ["redis-server", "--requirepass", "redis", "--replicaof", "order-redis-master", "6379",
              "--masterauth", "redis", "--maxmemory", "512mb", "--appendonly", "yes"]
    volumes:
      - order-replica-data:/data
    depends_on:
      order-redis-master:
        condition: service_healthy
    restart: unless-stopped

  # STOCK SERVICE
  stock-service-1:
    build: ./stock
    image: stock:latest
    environment:
      - REDIS_HOST=stock-redis-master
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
    command: gunicorn -b 0.0.0.0:5000 -w 4 --timeout 30 --log-level=info app:app
    depends_on:
      stock-redis-master:
        condition: service_healthy
    restart: unless-stopped

  stock-service-2:
    build: ./stock
    image: stock:latest
    environment:
      - REDIS_HOST=stock-redis-master
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
    command: gunicorn -b 0.0.0.0:5000 -w 4 --timeout 30 --log-level=info app:app
    depends_on:
      stock-redis-master:
        condition: service_healthy
    restart: unless-stopped

  stock-redis-master:
    image: redis:7.2-bookworm
    command: ["redis-server", "--requirepass", "redis", "--maxmemory", "512mb", "--appendonly", "yes"]
    volumes:
      - stock-master-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  stock-redis-replica:
    image: redis:7.2-bookworm
    command: ["redis-server", "--requirepass", "redis", "--replicaof", "stock-redis-master", "6379",
              "--masterauth", "redis", "--maxmemory", "512mb", "--appendonly", "yes"]
    volumes:
      - stock-replica-data:/data
    depends_on:
      stock-redis-master:
        condition: service_healthy
    restart: unless-stopped

  # PAYMENT SERVICE
  payment-service-1:
    build: ./payment
    image: user:latest
    environment:
      - REDIS_HOST=payment-redis-master
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
    command: gunicorn -b 0.0.0.0:5000 -w 4 --timeout 30 --log-level=info app:app
    depends_on:
      payment-redis-master:
        condition: service_healthy
    restart: unless-stopped

  payment-service-2:
    build: ./payment
    image: user:latest
    environment:
      - REDIS_HOST=payment-redis-master
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
    command: gunicorn -b 0.0.0.0:5000 -w 4 --timeout 30 --log-level=info app:app
    depends_on:
      payment-redis-master:
        condition: service_healthy
    restart: unless-stopped

  payment-redis-master:
    image: redis:7.2-bookworm
    command: ["redis-server", "--requirepass", "redis", "--maxmemory", "512mb", "--appendonly", "yes"]
    volumes:
      - payment-master-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  payment-redis-replica:
    image: redis:7.2-bookworm
    command: ["redis-server", "--requirepass", "redis", "--replicaof", "payment-redis-master", "6379",
              "--masterauth", "redis", "--maxmemory", "512mb", "--appendonly", "yes"]
    volumes:
      - payment-replica-data:/data
    depends_on:
      payment-redis-master:
        condition: service_healthy
    restart: unless-stopped

volumes:
  order-master-data:
  order-replica-data:
  stock-master-data:
  stock-replica-data:
  payment-master-data:
  payment-replica-data:
