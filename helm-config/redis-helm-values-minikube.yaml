# Redis Helm overrides for local minikube testing.
# Replaces the resource requests in redis-helm-values.yaml with smaller values
# so Redis fits on a single-node minikube cluster.

auth:
  password: redis
  sentinel: false   # Sentinel itself does not require a password

commonConfiguration: |-
  appendonly yes
  appendfsync everysec

sentinel:
  enabled: true
  masterSet: mymaster
  quorum: 1
  downAfterMilliseconds: 5000
  failoverTimeout: 10000
  # Minikube is slower: give the sentinel container more time to start
  startupProbe:
    failureThreshold: 40
    periodSeconds: 10
    timeoutSeconds: 10
  livenessProbe:
    timeoutSeconds: 10
    failureThreshold: 10
  readinessProbe:
    timeoutSeconds: 5

replica:
  replicaCount: 2
  persistence:
    size: 1Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  # Minikube is slower: give the redis container more time to start
  startupProbe:
    failureThreshold: 40
    periodSeconds: 10
    timeoutSeconds: 10
  livenessProbe:
    timeoutSeconds: 10
    failureThreshold: 10
  readinessProbe:
    timeoutSeconds: 5
