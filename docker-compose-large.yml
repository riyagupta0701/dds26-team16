## Large cluster: exactly 90 CPUs total (hard limits sum, leaves 6 for locust on 96-core machine).
##
## CPU accounting (hard limits, exact):
##   mq-redis:                        1.0
##   gateway (nginx):                 2.0
##   order-service  ×8 (8 workers):   27.2  (8 replicas × 3.4 CPU limit)
##   stock-service  ×8 (8 workers):   27.2
##   payment-service×8 (8 workers):   27.2
##   3× redis masters:                3.0   (1.0 each)
##   3× redis replicas:               1.5   (0.5 each)
##   9× redis sentinels:              0.9   (0.1 each)
##   ─────────────────────────────────
##   Total = 90.0 CPUs
##
## Note: deploy.resources limits cap per-container usage. Under real load the
## gunicorn processes will saturate their CPUs; the limits prevent any one
## container from starving others.

services:
  # ── MESSAGE QUEUE BROKER ──────────────────────────────────────────────────
  mq-redis:
    image: redis:7.2-bookworm
    command: ["redis-server", "--requirepass", "redis", "--maxmemory", "1gb",
              "--hz", "20", "--dynamic-hz", "yes"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1280M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── GATEWAY ───────────────────────────────────────────────────────────────
  gateway:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx_large.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    depends_on:
      - order-service-1
      - order-service-2
      - order-service-3
      - order-service-4
      - order-service-5
      - order-service-6
      - order-service-7
      - order-service-8
      - stock-service-1
      - stock-service-2
      - stock-service-3
      - stock-service-4
      - stock-service-5
      - stock-service-6
      - stock-service-7
      - stock-service-8
      - payment-service-1
      - payment-service-2
      - payment-service-3
      - payment-service-4
      - payment-service-5
      - payment-service-6
      - payment-service-7
      - payment-service-8
    restart: unless-stopped

  # ── ORDER SERVICE (8 replicas × 8 workers) ───────────────────────────────
  order-service-1: &order-service
    build: ./order
    image: order:latest
    environment: &order-env
      - MQ_REDIS_HOST=mq-redis
      - MQ_REDIS_PORT=6379
      - MQ_REDIS_PASSWORD=redis
      - MQ_REDIS_DB=0
      - GATEWAY_URL=http://gateway:80
      - CHECKOUT_MODE=saga
      - REDIS_HOST=order-redis-master
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
      - REDIS_SENTINEL_HOSTS=order-redis-sentinel:26379,order-redis-sentinel-2:26379,order-redis-sentinel-3:26379
      - REDIS_MASTER_NAME=order-master
    command: gunicorn -b 0.0.0.0:5000 -w 8 --timeout 30 --log-level=info app:app
    deploy:
      resources:
        limits:
          cpus: "3.4"
          memory: 512M
    depends_on:
      mq-redis:
        condition: service_healthy
      order-redis-sentinel:
        condition: service_healthy
    restart: unless-stopped

  order-service-2:
    <<: *order-service
    environment: *order-env
  order-service-3:
    <<: *order-service
    environment: *order-env
  order-service-4:
    <<: *order-service
    environment: *order-env
  order-service-5:
    <<: *order-service
    environment: *order-env
  order-service-6:
    <<: *order-service
    environment: *order-env
  order-service-7:
    <<: *order-service
    environment: *order-env
  order-service-8:
    <<: *order-service
    environment: *order-env

  order-redis-master:
    image: redis:7.2-bookworm
    command: ["redis-server", "--requirepass", "redis", "--masterauth", "redis",
              "--maxmemory", "2gb", "--appendonly", "yes", "--appendfsync", "everysec",
              "--hz", "20", "--dynamic-hz", "yes"]
    volumes:
      - order-master-data:/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2560M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  order-redis-replica:
    image: redis:7.2-bookworm
    command: ["redis-server", "--requirepass", "redis", "--replicaof", "order-redis-master", "6379",
              "--masterauth", "redis", "--maxmemory", "2gb", "--appendonly", "yes"]
    volumes:
      - order-replica-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 2560M
    depends_on:
      order-redis-master:
        condition: service_healthy
    restart: unless-stopped

  order-redis-sentinel: &order-sentinel
    image: redis:7.2-bookworm
    command: >
      sh -c "
        echo 'sentinel resolve-hostnames yes' > /tmp/sentinel.conf &&
        echo 'sentinel monitor order-master order-redis-master 6379 2' >> /tmp/sentinel.conf &&
        echo 'sentinel auth-pass order-master redis' >> /tmp/sentinel.conf &&
        echo 'sentinel down-after-milliseconds order-master 5000' >> /tmp/sentinel.conf &&
        echo 'sentinel failover-timeout order-master 10000' >> /tmp/sentinel.conf &&
        echo 'sentinel parallel-syncs order-master 1' >> /tmp/sentinel.conf &&
        redis-server /tmp/sentinel.conf --sentinel --port 26379
      "
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
    depends_on:
      order-redis-master:
        condition: service_healthy
    restart: unless-stopped

  order-redis-sentinel-2:
    <<: *order-sentinel

  order-redis-sentinel-3:
    <<: *order-sentinel

  # ── STOCK SERVICE (8 replicas × 8 workers) ───────────────────────────────
  stock-service-1: &stock-service
    build: ./stock
    image: stock:latest
    environment: &stock-env
      - MQ_REDIS_HOST=mq-redis
      - MQ_REDIS_PORT=6379
      - MQ_REDIS_PASSWORD=redis
      - MQ_REDIS_DB=0
      - REDIS_HOST=stock-redis-master
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
      - REDIS_SENTINEL_HOSTS=stock-redis-sentinel:26379,stock-redis-sentinel-2:26379,stock-redis-sentinel-3:26379
      - REDIS_MASTER_NAME=stock-master
    command: gunicorn -b 0.0.0.0:5000 -w 8 --timeout 30 --log-level=info app:app
    deploy:
      resources:
        limits:
          cpus: "3.4"
          memory: 512M
    depends_on:
      mq-redis:
        condition: service_healthy
      stock-redis-sentinel:
        condition: service_healthy
    restart: unless-stopped

  stock-service-2:
    <<: *stock-service
    environment: *stock-env
  stock-service-3:
    <<: *stock-service
    environment: *stock-env
  stock-service-4:
    <<: *stock-service
    environment: *stock-env
  stock-service-5:
    <<: *stock-service
    environment: *stock-env
  stock-service-6:
    <<: *stock-service
    environment: *stock-env
  stock-service-7:
    <<: *stock-service
    environment: *stock-env
  stock-service-8:
    <<: *stock-service
    environment: *stock-env

  stock-redis-master:
    image: redis:7.2-bookworm
    command: ["redis-server", "--requirepass", "redis", "--masterauth", "redis",
              "--maxmemory", "2gb", "--appendonly", "yes", "--appendfsync", "everysec",
              "--hz", "20", "--dynamic-hz", "yes"]
    volumes:
      - stock-master-data:/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2560M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  stock-redis-replica:
    image: redis:7.2-bookworm
    command: ["redis-server", "--requirepass", "redis", "--replicaof", "stock-redis-master", "6379",
              "--masterauth", "redis", "--maxmemory", "2gb", "--appendonly", "yes"]
    volumes:
      - stock-replica-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 2560M
    depends_on:
      stock-redis-master:
        condition: service_healthy
    restart: unless-stopped

  stock-redis-sentinel: &stock-sentinel
    image: redis:7.2-bookworm
    command: >
      sh -c "
        echo 'sentinel resolve-hostnames yes' > /tmp/sentinel.conf &&
        echo 'sentinel monitor stock-master stock-redis-master 6379 2' >> /tmp/sentinel.conf &&
        echo 'sentinel auth-pass stock-master redis' >> /tmp/sentinel.conf &&
        echo 'sentinel down-after-milliseconds stock-master 5000' >> /tmp/sentinel.conf &&
        echo 'sentinel failover-timeout stock-master 10000' >> /tmp/sentinel.conf &&
        echo 'sentinel parallel-syncs stock-master 1' >> /tmp/sentinel.conf &&
        redis-server /tmp/sentinel.conf --sentinel --port 26379
      "
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
    depends_on:
      stock-redis-master:
        condition: service_healthy
    restart: unless-stopped

  stock-redis-sentinel-2:
    <<: *stock-sentinel

  stock-redis-sentinel-3:
    <<: *stock-sentinel

  # ── PAYMENT SERVICE (8 replicas × 8 workers) ─────────────────────────────
  payment-service-1: &payment-service
    build: ./payment
    image: user:latest
    environment: &payment-env
      - MQ_REDIS_HOST=mq-redis
      - MQ_REDIS_PORT=6379
      - MQ_REDIS_PASSWORD=redis
      - MQ_REDIS_DB=0
      - REDIS_HOST=payment-redis-master
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
      - REDIS_SENTINEL_HOSTS=payment-redis-sentinel:26379,payment-redis-sentinel-2:26379,payment-redis-sentinel-3:26379
      - REDIS_MASTER_NAME=payment-master
    command: gunicorn -b 0.0.0.0:5000 -w 8 --timeout 30 --log-level=info app:app
    deploy:
      resources:
        limits:
          cpus: "3.4"
          memory: 512M
    depends_on:
      mq-redis:
        condition: service_healthy
      payment-redis-sentinel:
        condition: service_healthy
    restart: unless-stopped

  payment-service-2:
    <<: *payment-service
    environment: *payment-env
  payment-service-3:
    <<: *payment-service
    environment: *payment-env
  payment-service-4:
    <<: *payment-service
    environment: *payment-env
  payment-service-5:
    <<: *payment-service
    environment: *payment-env
  payment-service-6:
    <<: *payment-service
    environment: *payment-env
  payment-service-7:
    <<: *payment-service
    environment: *payment-env
  payment-service-8:
    <<: *payment-service
    environment: *payment-env

  payment-redis-master:
    image: redis:7.2-bookworm
    command: ["redis-server", "--requirepass", "redis", "--masterauth", "redis",
              "--maxmemory", "2gb", "--appendonly", "yes", "--appendfsync", "everysec",
              "--hz", "20", "--dynamic-hz", "yes"]
    volumes:
      - payment-master-data:/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2560M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  payment-redis-replica:
    image: redis:7.2-bookworm
    command: ["redis-server", "--requirepass", "redis", "--replicaof", "payment-redis-master", "6379",
              "--masterauth", "redis", "--maxmemory", "2gb", "--appendonly", "yes"]
    volumes:
      - payment-replica-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 2560M
    depends_on:
      payment-redis-master:
        condition: service_healthy
    restart: unless-stopped

  payment-redis-sentinel: &payment-sentinel
    image: redis:7.2-bookworm
    command: >
      sh -c "
        echo 'sentinel resolve-hostnames yes' > /tmp/sentinel.conf &&
        echo 'sentinel monitor payment-master payment-redis-master 6379 2' >> /tmp/sentinel.conf &&
        echo 'sentinel auth-pass payment-master redis' >> /tmp/sentinel.conf &&
        echo 'sentinel down-after-milliseconds payment-master 5000' >> /tmp/sentinel.conf &&
        echo 'sentinel failover-timeout payment-master 10000' >> /tmp/sentinel.conf &&
        echo 'sentinel parallel-syncs payment-master 1' >> /tmp/sentinel.conf &&
        redis-server /tmp/sentinel.conf --sentinel --port 26379
      "
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
    depends_on:
      payment-redis-master:
        condition: service_healthy
    restart: unless-stopped

  payment-redis-sentinel-2:
    <<: *payment-sentinel

  payment-redis-sentinel-3:
    <<: *payment-sentinel

volumes:
  order-master-data:
  order-replica-data:
  stock-master-data:
  stock-replica-data:
  payment-master-data:
  payment-replica-data:
