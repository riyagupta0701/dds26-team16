        condition: service_healthy
    restart: unless-stopped

  payment-redis-sentinel-2:
    <<: *payment-sentinel

  payment-redis-sentinel-3:
    <<: *payment-sentinel

volumes:
  order-master-data:
  order-replica-data:
  stock-master-data:
  stock-replica-data:
  payment-master-data:
  payment-replica-data:
